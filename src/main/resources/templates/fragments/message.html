<div
        data-th-if="${session.message}"
        data-th-object="${session.message}"
        data-th-fragment="messagebox"
        style="display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin-bottom: 16px; border-radius: var(--rx-radius-sm); font-size: 0.84rem;"
        data-th-style="*{type == 'green' ? 'background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #10b981;' : type == 'red' ? 'background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444;' : 'background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.2); color: #eab308;'}"
        role="alert"
>
    <i class="fa-solid fa-circle-info" style="flex-shrink: 0;"></i>
    <span class="sr-only">Info</span>
    <div>
        <span data-th-text="*{content}"></span>
    </div>

    <th:block th:text="${@sessionHelper.removeMessage()}"></th:block>
</div>
