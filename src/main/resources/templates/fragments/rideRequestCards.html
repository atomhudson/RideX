<div th:fragment="rideRequestCards">
    <div th:each="request : ${profileRidesDetails.requestMade}" style="margin-bottom: 12px;">
        <div class="rx-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 700; color: var(--rx-text-primary);">
                        <span th:text="${request.ride.sourceCity}">Source</span>
                        <i class="fa-solid fa-arrow-right" style="font-size: 0.65rem; color: var(--rx-accent);"></i>
                        <span th:text="${request.ride.destinationCity}">Dest</span>
                    </div>
                    <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                        <span class="rx-badge" th:text="${#dates.format(request.ride.startTime, 'HH:mm')}">08:00</span>
                        <span class="rx-badge" th:text="${#dates.format(request.ride.startTime, 'dd MMM yyyy')}">01 Jan</span>
                        <span class="rx-badge" th:text="'Seats: ' + ${request.requestedSeats}">Seats: 2</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <img th:src="@{${request.ride.driver.profilePic}}" alt="Driver" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;" />
                        <span style="font-size: 0.84rem; color: var(--rx-text-secondary);" th:text="${request.ride.driver.fName + ' ' + request.ride.driver.lName}">Driver</span>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--rx-text-muted);">
                        <div>Requested: <span style="color: var(--rx-text-primary);" th:text="${#dates.format(request.requestedAt, 'yyyy-MM-dd')}">2025-05-01</span></div>
                        <div th:if="${request.isCoDriver}" style="margin-top: 2px;">Applied as Co-Driver</div>
                    </div>
                </div>
                <div style="text-align: right; display: flex; flex-direction: column; gap: 6px; align-items: flex-end;">
                    <span style="font-size: 1.1rem; font-weight: 800; color: var(--rx-accent);" th:text="'₹' + ${request.finalPrice}">₹500</span>
                    <span class="rx-badge" th:text="${request.requestStatus}" style="background: rgba(139,92,246,0.15); color: #8b5cf6;">Pending</span>
                </div>
            </div>
        </div>
    </div>
</div>
