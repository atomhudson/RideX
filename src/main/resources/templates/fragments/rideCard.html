<!-- Page Container -->
<div th:fragment="rideCardsWithFilter" style="display: grid; grid-template-columns: 280px 1fr; gap: 24px;">

    <!-- Filters Sidebar -->
    <aside class="rx-filter-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2><i class="fa-solid fa-sliders" style="margin-right: 8px;"></i> Filters</h2>
            <button id="clearFilters" style="font-size: 0.8rem; color: #ef4444; background: none; border: none; cursor: pointer;">Clear all</button>
        </div>

        <!-- Sort By -->
        <div style="margin-bottom: 24px;">
            <h3>Sort by</h3>
            <ul>
                <li>
                    <label>
                        <input type="radio" name="sort" id="earliest" value="earliest" data-filter="sort">
                        Earliest departure
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="sort" id="lowest" value="lowest" data-filter="sort">
                        Lowest price
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="sort" id="close-departure" value="close-departure" data-filter="sort">
                        Close to departure
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="sort" id="close-arrival" value="close-arrival" data-filter="sort">
                        Close to arrival
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="sort" id="shortest" value="shortest" data-filter="sort">
                        Shortest ride
                    </label>
                </li>
            </ul>
        </div>

        <!-- Departure Time -->
        <div style="margin-bottom: 24px;">
            <h3>Departure time</h3>
            <ul>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="time" value="06:00-12:00">
                        06:00 - 12:00
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${morningCount} + ')'">(0)</span>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="time" value="12:01-18:00">
                        12:01 - 18:00
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${afternoonCount} + ')'">(0)</span>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="time" value="18:01-23:59">
                        After 18:00
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${eveningCount} + ')'">(0)</span>
                </li>
            </ul>
        </div>

        <!-- Amenities -->
        <div>
            <h3>Amenities</h3>
            <ul>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="amenity" value="ac">
                        AC Available
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${acCount} + ')'">(0)</span>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="amenity" value="luggage">
                        Luggage Allowed
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${luggageCount} + ')'">(0)</span>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="amenity" value="smoking">
                        Smoking Allowed
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${smokingCount} + ')'">(0)</span>
                </li>
                <li style="display: flex; justify-content: space-between; align-items: center;">
                    <label>
                        <input type="checkbox" data-filter="amenity" value="pets">
                        Pets Allowed
                    </label>
                    <span style="font-size: 0.75rem; color: var(--rx-text-muted);" th:text="'(' + ${petsCount} + ')'">(0)</span>
                </li>
            </ul>
        </div>
    </aside>

    <!-- Main Content: Ride Cards -->
    <main>
        <ul id="rideList" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 16px;">
            <li th:each="ride : ${matchedRides}" th:if="${ride.rideStatus == 'PLANNED' or ride.rideStatus == 'ONGOING'}"
                th:data-amenities="${#strings.concat(
                    #strings.concat(
                        #strings.concat(
                            #strings.concat(
                                ride.acAvailable ? 'ac,' : '',
                                ride.luggageAllowed ? 'luggage,' : ''
                            ),
                            ride.allowSmoking ? 'smoking,' : ''
                        ),
                        ride.allowPets ? 'pets' : ''
                    )
                )}">
                <div class="rx-card" style="display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap;">
                    <!-- Route Info -->
                    <div style="display: flex; align-items: center; gap: 16px; flex: 1;">
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--rx-accent-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i class="fa-solid fa-car" style="color: var(--rx-accent); font-size: 1.1rem;"></i>
                        </div>
                        <div>
                            <div style="display: flex; align-items: center; gap: 8px; font-size: 1.05rem; font-weight: 700; color: var(--rx-text-primary);">
                                <span th:text="${ride.sourceCity}">Delhi</span>
                                <i class="fa-solid fa-arrow-right" style="font-size: 0.7rem; color: var(--rx-accent);"></i>
                                <span th:text="${ride.destinationCity}">Chandigarh</span>
                            </div>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
                                <span class="rx-badge" th:text="${#dates.format(ride.startTime, 'dd MMM yyyy')}">10 May 2025</span>
                                <span class="rx-badge" th:text="${#dates.format(ride.startTime, 'HH:mm')}">09:00</span>
                                <span class="rx-badge" th:text="${ride.driver.fName + ' ' + ride.driver.lName}">Driver Name</span>
                            </div>
                        </div>
                    </div>

                    <!-- Price & Action -->
                    <div style="text-align: right; flex-shrink: 0;">
                        <p style="font-size: 1.5rem; font-weight: 800; color: var(--rx-accent); margin: 0;" th:text="'₹' + ${ride.price}">
                            ₹150
                        </p>
                        <a th:href="@{'/user/ride/detail/' + ${ride.rideId}}" class="rx-btn rx-btn-outline" style="margin-top: 8px; font-size: 0.84rem; padding: 8px 20px;">
                            View Details <i class="fa-solid fa-chevron-right" style="font-size: 0.65rem; margin-left: 4px;"></i>
                        </a>
                    </div>
                </div>
            </li>
        </ul>
    </main>
</div>
