<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">

<head>
    <title>RideX - Find a Ride</title>
</head>

<body>
    <div id="content" style="background: var(--rx-bg-primary);">

        <!-- Search Section -->
        <section class="rx-section" style="padding-top: 140px;">
            <div class="rx-container">
                <div class="rx-search-hero rx-reveal">
                    <h2>Your pick of rides at low prices</h2>
                    <form class="rx-search-form" th:action="@{'/process-search'}" method="post" th:object="${searchForm}">
                        <!-- From -->
                        <div class="rx-search-input-group">
                            <i class="fa-solid fa-location-dot rx-input-icon" style="color: var(--rx-accent);"></i>
                            <input id="from" name="from" th:field="*{from}" type="text" placeholder="From"
                                class="rx-form-input" />
                            <ul id="from-suggestions" class="hidden"></ul>
                        </div>

                        <!-- To -->
                        <div class="rx-search-input-group">
                            <i class="fa-solid fa-location-dot rx-input-icon" style="color: #ef4444;"></i>
                            <input id="to" name="to" th:field="*{to}" type="text" placeholder="To"
                                class="rx-form-input" />
                            <ul id="to-suggestions" class="hidden"></ul>
                        </div>

                        <!-- Date -->
                        <div class="rx-search-input-group">
                            <input id="date" name="date" th:field="*{date}" type="date" class="rx-form-input" />
                        </div>

                        <!-- Search Button -->
                        <button type="submit" class="rx-btn rx-btn-primary" style="padding: 12px 32px; white-space: nowrap;">
                            <i class="fa-solid fa-magnifying-glass"></i> Search
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Results or Landing -->
        <section class="rx-section" style="padding-top: 0;">
            <div class="rx-container">
                <div th:if="${matchedRides != null && !matchedRides.isEmpty()}"
                     th:insert="~{fragments/rideCard :: rideCardsWithFilter}"></div>
                <div th:unless="${matchedRides != null && !matchedRides.isEmpty()}"
                     th:insert="~{fragments/landing :: landing}"></div>
            </div>
        </section>

    </div>

    <script th:src="@{'/js/searchRide.js'}" type="module"></script>
    <script th:src="@{'/js/rideFilters.js'}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const dateInput = document.getElementById("date");
            if (dateInput && !dateInput.value) {
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
            }
        });
    </script>
</body>

</html>
