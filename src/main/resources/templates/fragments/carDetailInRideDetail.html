<div th:fragment="carDetail">
    <h3 style="font-size: 1rem; font-weight: 700; color: var(--rx-text-primary); margin: 0 0 12px; display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-car-side" style="color: var(--rx-accent);"></i> Car Details
    </h3>
    <div style="display: flex; gap: 16px; padding: 16px; border-radius: var(--rx-radius-md); border: 1px solid var(--rx-border); background: var(--rx-bg-tertiary);">
        <img th:src="@{${ride.car.car_image_url.get(0)}}" alt="Car" style="width: 160px; height: 120px; border-radius: var(--rx-radius-sm); object-fit: cover; border: 1px solid var(--rx-border);" />
        <div style="display: flex; flex-direction: column; gap: 10px; font-size: 0.84rem; color: var(--rx-text-secondary);">
            <div><i class="fa-solid fa-car" style="color: var(--rx-accent); margin-right: 8px; width: 14px;"></i> <span style="color: var(--rx-text-primary);" th:text="${ride.car.carModel + ' ' + ride.car.carMake}">Swift</span></div>
            <div><i class="fa-solid fa-palette" style="color: var(--rx-accent); margin-right: 8px; width: 14px;"></i> <span style="color: var(--rx-text-primary);" th:text="${ride.car.color}">White</span></div>
            <div><i class="fa-solid fa-id-card" style="color: var(--rx-accent); margin-right: 8px; width: 14px;"></i> <span style="color: var(--rx-text-primary);" th:text="${ride.car.carNumber}">DL 3C</span></div>
            <div><i class="fa-solid fa-users" style="color: var(--rx-accent); margin-right: 8px; width: 14px;"></i> <span style="color: var(--rx-text-primary);" th:text="${ride.car.carType + ' - ' + ride.car.seat_available + ' Seater'}">SUV</span></div>
        </div>
    </div>
</div>
