<div th:fragment="details" style="background: var(--rx-bg-tertiary); padding: 20px; border-radius: var(--rx-radius-md); border: 1px solid var(--rx-border); display: flex; flex-direction: column; gap: 20px;">

  <!-- Source -->
  <div style="border-left: 3px solid var(--rx-accent); padding-left: 16px;">
    <h3 style="font-size: 1rem; font-weight: 700; color: var(--rx-accent); margin: 0; display: flex; align-items: center; gap: 8px;">
      <i class="fa-solid fa-circle-dot" style="font-size: 0.7rem;"></i>
      <span th:text="${#dates.format(ride.startTime, 'HH:mm')} + ' → ' + ${ride.sourceCity}">18:00 → Gajraula</span>
    </h3>
    <p style="font-size: 0.8rem; color: var(--rx-text-muted); margin: 4px 0 0;" th:text="${ride.sourceAddress}">Source Address</p>
  </div>

  <!-- Destination -->
  <div style="border-left: 3px solid #ef4444; padding-left: 16px;">
    <h3 style="font-size: 1rem; font-weight: 700; color: #ef4444; margin: 0; display: flex; align-items: center; gap: 8px;">
      <i class="fa-solid fa-location-dot" style="font-size: 0.7rem;"></i>
      <span th:text="${#dates.format(ride.endTime, 'HH:mm')} + ' → ' + ${ride.destinationCity}">19:50 → Noida</span>
    </h3>
    <p style="font-size: 0.8rem; color: var(--rx-text-muted); margin: 4px 0 0;" th:text="${ride.destinationAddress}">Destination</p>
  </div>

  <!-- Availability -->
  <div>
    <div th:if="${ride.rideStatus != 'COMPLETED' and ride.rideStatus != 'ONGOING' and ride.rideStatus != 'CANCELLED'}"
         style="background: rgba(16,185,129,0.1); padding: 14px 16px; border-radius: var(--rx-radius-sm); border: 1px solid rgba(16,185,129,0.2);">
      <h3 style="font-size: 0.9rem; font-weight: 700; color: var(--rx-accent); margin: 0 0 4px;">Available Seats</h3>
      <p style="font-size: 0.8rem; color: var(--rx-text-secondary); margin: 0;" th:text="${ride.availableSeats} + ' seat(s) available'">3 seat(s)</p>
    </div>
    <div th:unless="${ride.rideStatus != 'COMPLETED' and ride.rideStatus != 'ONGOING' and ride.rideStatus != 'CANCELLED'}"
         style="background: rgba(139,92,246,0.1); padding: 14px 16px; border-radius: var(--rx-radius-sm); border: 1px solid rgba(139,92,246,0.2);">
      <h3 style="font-size: 0.9rem; font-weight: 700; color: #8b5cf6; margin: 0 0 4px;">Ride Status</h3>
      <p style="font-size: 0.8rem; color: var(--rx-text-secondary); margin: 0;" th:text="'Status: ' + ${ride.rideStatus}">COMPLETED</p>
    </div>
  </div>
</div>
