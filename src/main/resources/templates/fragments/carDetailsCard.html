<div th:fragment="carDetails">
    <div class="rx-card" style="display: flex; flex-direction: row; gap: 24px; max-width: 720px; padding: 0; overflow: hidden;">
        <div style="flex: 0 0 260px; min-height: 200px;">
            <img th:src="@{${carDtoDetails.car_Image_Url}}" alt="Car Image" style="width: 100%; height: 100%; object-fit: cover;" />
        </div>
        <div style="flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: center;">
            <h1 style="font-size: 1.4rem; font-weight: 800; color: var(--rx-text-primary); margin: 0 0 20px;" th:text="${carDtoDetails.carMake} + ' ' + ${carDtoDetails.carModel} + ' ' + ${carDtoDetails.year}">Toyota Corolla 2022</h1>
            <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;">
                <span class="rx-badge"><strong>Type:</strong> <span th:text="${carDtoDetails.carType}">Sedan</span></span>
                <span class="rx-badge"><strong>Fuel:</strong> <span th:text="${carDtoDetails.fuelType}">Petrol</span></span>
                <span class="rx-badge"><strong>Color:</strong> <span th:text="${carDtoDetails.color}">White</span></span>
                <span class="rx-badge"><strong>Seats:</strong> <span th:text="${carDtoDetails.seat_available}">4</span></span>
            </div>
            <div style="font-size: 0.84rem; color: var(--rx-text-secondary);">
                <p style="margin: 0 0 4px;">Car Number: <span style="font-weight: 600; color: var(--rx-text-primary);" th:text="${carDtoDetails.carNumber}">AB12CD3456</span></p>
                <p style="margin: 0;">AC: <span style="font-weight: 600; color: var(--rx-text-primary);" th:text="${carDtoDetails.ac_available ? 'Yes' : 'No'}">Yes</span></p>
            </div>
        </div>
    </div>
</div>
