<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">
<head><title>Reset Password — RideX</title></head>
<body>
<div id="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container">
            <div class="rx-form-card rx-reveal" style="max-width: 480px;">
                <h1>Reset Password</h1>
                <div th:insert="~{fragments/message::messagebox}"></div>
                <form method="post" th:action="@{'/reset-password'}">
                    <input type="hidden" name="email" th:value="${email}" />
                    <div class="rx-form-group" style="margin-bottom: 16px;">
                        <label for="otp">OTP</label>
                        <input name="otp" id="otp" type="text" class="rx-form-input" placeholder="Enter OTP" required />
                    </div>
                    <div class="rx-form-group" style="margin-bottom: 16px;">
                        <label for="newPassword">New Password</label>
                        <input name="newPassword" id="newPassword" type="password" class="rx-form-input" placeholder="Enter new password" required />
                    </div>
                    <div class="rx-form-group" style="margin-bottom: 24px;">
                        <label for="confirmPassword">Confirm Password</label>
                        <input name="confirmPassword" id="confirmPassword" type="password" class="rx-form-input" placeholder="Confirm new password" required />
                    </div>
                    <button type="submit" class="rx-btn rx-btn-primary" style="width: 100%; padding: 14px;">Reset Password</button>
                </form>
                <div style="text-align: center; margin-top: 20px;">
                    <a th:href="@{'/login'}" class="rx-link">Back to Login</a>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
<script>console.log("Reset Password Page");</script>
</html>
