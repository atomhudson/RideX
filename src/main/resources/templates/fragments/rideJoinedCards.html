<div th:fragment="rideJoinedCard">
    <div th:each="ride : ${profileRidesDetails.ridesJoined}" style="margin-bottom: 12px;">
        <a th:href="@{'/user/ride/rideJoined/detail/' + ${ride.rideId}}" class="rx-card" style="display: block; text-decoration: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 700; color: var(--rx-text-primary);">
                        <span th:text="${ride.sourceCity}">Source</span>
                        <i class="fa-solid fa-arrow-right" style="font-size: 0.65rem; color: var(--rx-accent);"></i>
                        <span th:text="${ride.destinationCity}">Dest</span>
                    </div>
                    <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                        <span class="rx-badge" th:text="${#dates.format(ride.startTime, 'HH:mm')}">08:00</span>
                        <span class="rx-badge" th:text="${#dates.format(ride.startTime, 'dd MMM yyyy')}">01 Jan</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <img th:src="${ride.driver.profilePic}" alt="Driver" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;" />
                        <span style="font-size: 0.84rem; color: var(--rx-text-secondary);" th:text="${ride.driver.fName + ' ' + ride.driver.lName}">Driver</span>
                    </div>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 1.1rem; font-weight: 800; color: var(--rx-accent);" th:text="'₹' + ${ride.price}">₹500</span>
                </div>
            </div>
        </a>
    </div>
</div>
