<header th:fragment="navbar" class="rx-navbar">
    <nav class="rx-navbar-inner">
        <a th:href="@{'/'}" class="rx-logo">
            <img th:src="@{'/images/logo.svg'}" alt="RideX Logo" />
            <span>RideX</span>
        </a>

        <ul class="rx-nav-links" id="rx-nav-links">
            <li><a th:href="@{'/'}">Home</a></li>
            <li><a th:href="@{'/company'}">Company</a></li>
            <li><a th:href="@{'/features'}">Features</a></li>
            <li><a th:href="@{'/team'}">Team</a></li>
        </ul>

        <div class="rx-nav-actions">
            <a th:href="@{'/searchRide'}" class="rx-btn rx-btn-icon rx-btn-ghost" title="Search Rides">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>

            <!-- Show only Sign Up button on Login page -->
            <a th:if="${isLogInPage == true}" th:href="@{'/signup'}" class="rx-btn rx-btn-primary">Sign Up</a>

            <!-- Show only Login button on SignUp page -->
            <a th:if="${isSignUpPage == true}" th:href="@{'/login'}" class="rx-btn rx-btn-ghost">Log in</a>

            <!-- Show both buttons when neither on login nor signup page -->
            <a th:if="${isLogInPage == null and isSignUpPage == null}" th:href="@{'/login'}" class="rx-btn rx-btn-ghost">Log in</a>
            <a th:if="${isLogInPage == null and isSignUpPage == null}" th:href="@{'/signup'}" class="rx-btn rx-btn-primary">Sign Up</a>

            <button id="rx-mobile-toggle" class="rx-mobile-toggle" type="button" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>
</header>
