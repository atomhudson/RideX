<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">
<head><title>Forgot Password — RideX</title></head>
<body>
<div id="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container">
            <div class="rx-form-card rx-reveal" style="max-width: 480px;">
                <h1>Forgot Password</h1>
                <div th:insert="~{fragments/message::messagebox}"></div>
                <form method="post" th:action="@{'/forgot-password'}">
                    <div class="rx-form-group" style="margin-bottom: 24px;">
                        <label for="email">Email</label>
                        <input name="email" id="email" type="email" class="rx-form-input" placeholder="Enter your email" required />
                    </div>
                    <button type="submit" class="rx-btn rx-btn-primary" style="width: 100%; padding: 14px;">Send OTP</button>
                </form>
                <div style="text-align: center; margin-top: 20px;">
                    <a th:href="@{'/login'}" class="rx-link">Back to Login</a>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
<script>console.log("Forgot Password Page");</script>
</html>
