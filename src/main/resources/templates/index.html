<!DOCTYPE html>
<html class="dark" lang="en" th:fragment="parent(content,title,script)" xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/metadata :: metadata}"></div>
    <link rel="stylesheet" th:href="@{'/css/output.css'}">
    <link rel="stylesheet" th:href="@{'/css/ridex-theme.css'}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kameron:wght@400..700&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://demo.themesberg.com/landwind/" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/navbar :: navbar}"></div>
    </div>
    <div th:unless="${loggedInUser}">
        <div data-th-replace="~{fragments/navbar :: navbar}"></div>
    </div>

    <div>
        <section data-th-replace="${content}"></section>
    </div>

    <div data-th-replace="~{fragments/footer :: footer}"></div>
    <script src="https://unpkg.com/flowbite@1.4.1/dist/flowbite.js"></script>
    <script src="https://kit.fontawesome.com/ed25fb8f70.js" crossorigin="anonymous"></script>

    <!-- Scroll Reveal Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('rx-visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

            document.querySelectorAll('.rx-reveal').forEach(function (el) {
                observer.observe(el);
            });

            // Mobile nav toggle
            var toggle = document.getElementById('rx-mobile-toggle');
            var navLinks = document.getElementById('rx-nav-links');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function () {
                    navLinks.classList.toggle('rx-nav-open');
                    var icon = toggle.querySelector('i');
                    if (navLinks.classList.contains('rx-nav-open')) {
                        icon.classList.remove('fa-bars');
                        icon.classList.add('fa-xmark');
                    } else {
                        icon.classList.remove('fa-xmark');
                        icon.classList.add('fa-bars');
                    }
                });
            }

            // Active nav link
            var path = window.location.pathname;
            document.querySelectorAll('.rx-nav-links a').forEach(function (link) {
                var href = link.getAttribute('href');
                if (path === href || (href !== '/' && path.startsWith(href))) {
                    link.classList.add('active');
                } else if (href === '/' && (path === '/' || path === '/home')) {
                    link.classList.add('active');
                }
            });
        });
    </script>

    <th:block th:replace="${script}"></th:block>
</body>

</html>
