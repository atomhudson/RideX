<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">
<head><title>Write a Review — RideX</title></head>
<body>
<div id="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container">
            <div class="rx-form-card rx-reveal" style="max-width: 560px;">
                <h1>Write a Review</h1>
                <form th:action="@{/user/ratings/submit}" method="POST">
                    <input type="hidden" name="ratedId" th:value="${ratedId}" />

                    <!-- Star Rating -->
                    <div style="display: flex; justify-content: center; gap: 4px; margin-bottom: 24px;">
                        <div style="display: flex; flex-direction: row-reverse; justify-content: flex-end; align-items: center; gap: 4px;">
                            <input id="hs-ratings-readonly-1" type="radio" style="display: none;" name="hs-ratings-readonly" value="5" />
                            <label for="hs-ratings-readonly-1" style="cursor: pointer; font-size: 1.8rem; color: var(--rx-text-muted); transition: color 0.2s;">⭐</label>

                            <input id="hs-ratings-readonly-2" type="radio" style="display: none;" name="hs-ratings-readonly" value="4" />
                            <label for="hs-ratings-readonly-2" style="cursor: pointer; font-size: 1.8rem; color: var(--rx-text-muted); transition: color 0.2s;">⭐</label>

                            <input id="hs-ratings-readonly-3" type="radio" style="display: none;" name="hs-ratings-readonly" value="3" />
                            <label for="hs-ratings-readonly-3" style="cursor: pointer; font-size: 1.8rem; color: var(--rx-text-muted); transition: color 0.2s;">⭐</label>

                            <input id="hs-ratings-readonly-4" type="radio" style="display: none;" name="hs-ratings-readonly" value="2" />
                            <label for="hs-ratings-readonly-4" style="cursor: pointer; font-size: 1.8rem; color: var(--rx-text-muted); transition: color 0.2s;">⭐</label>

                            <input id="hs-ratings-readonly-5" type="radio" style="display: none;" name="hs-ratings-readonly" value="1" />
                            <label for="hs-ratings-readonly-5" style="cursor: pointer; font-size: 1.8rem; color: var(--rx-text-muted); transition: color 0.2s;">⭐</label>
                        </div>
                    </div>

                    <div class="rx-form-group" style="margin-bottom: 24px;">
                        <textarea id="review" name="review" rows="4" required class="rx-form-input" style="min-height: 100px; resize: vertical;" placeholder="Write your thoughts..."></textarea>
                    </div>

                    <button type="submit" class="rx-btn rx-btn-primary" style="width: 100%; padding: 14px;">
                        Submit Review
                    </button>
                </form>
            </div>
        </div>
    </section>
</div>
<script>console.log("Write Your Review");</script>
</body>
</html>
