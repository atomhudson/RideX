<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">
<head><title>Ratings Overview — RideX</title></head>
<body>
<div id="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 120px;">
        <div class="rx-container" style="max-width: 760px;">
            <div class="rx-section-header rx-reveal" style="margin-bottom: 32px;">
                <h2>User <span class="rx-text-accent">Ratings</span> Overview</h2>
            </div>

            <!-- Star Summary -->
            <div class="rx-reveal" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px;">
                <div th:each="i : ${#numbers.sequence(5,1)}"
                     th:with="count=${starCounts.get(i) != null ? starCounts.get(i) : 0}"
                     style="display: flex; align-items: center; justify-content: space-between; background: var(--rx-bg-card); border-radius: var(--rx-radius-sm); padding: 10px 16px; border: 1px solid var(--rx-border);">
                    <span style="font-size: 0.9rem; font-weight: 600; color: var(--rx-text-secondary); min-width: 180px;">
                        <span th:switch="${i}">
                            <span th:case="5">🌟 Outstanding</span>
                            <span th:case="4">👍 Good</span>
                            <span th:case="3">👌 Okay</span>
                            <span th:case="2">😕 Poor</span>
                            <span th:case="1">😠 Very Disappointing</span>
                        </span>
                    </span>
                    <span class="rx-badge" th:text="${count}">0</span>
                </div>
            </div>

            <!-- Reviews -->
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div th:each="rating, iterStat : ${ratings}" class="rx-card rx-reveal">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                        <div>
                            <div style="font-size: 1rem; font-weight: 600; color: var(--rx-text-primary);" th:text="${rating.rater.fName + ' ' + rating.rater.lName}">User</div>
                            <div style="display: flex; align-items: center; gap: 2px; margin-top: 4px;">
                                <span th:each="i : ${#numbers.sequence(1, 5)}">
                                    <i th:if="${i <= rating.stars}" class="fa-solid fa-star" style="color: #facc15; font-size: 0.75rem;"></i>
                                    <i th:if="${i > rating.stars}" class="fa-regular fa-star" style="color: var(--rx-text-muted); font-size: 0.75rem;"></i>
                                </span>
                            </div>
                        </div>
                        <span style="font-size: 0.75rem; color: var(--rx-text-muted); font-style: italic;" th:text="${formattedDates[iterStat.index]}">01 Jan</span>
                    </div>
                    <p style="font-size: 0.84rem; color: var(--rx-text-secondary); line-height: 1.6; margin: 0;" th:text="${rating.message}">Review text</p>
                </div>
            </div>
        </div>
    </section>
</div>
<script>console.log("See Reviews");</script>
</body>
</html>
