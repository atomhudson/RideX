<header
        th:fragment="navbar"
        class="rx-navbar"
>
    <nav class="rx-navbar-inner">
        <a th:href="@{'/'}" class="rx-logo">
            <img th:src="@{'/images/logo.svg'}" alt="RideX Logo" />
            <span>RideX</span>
        </a>

        <ul class="rx-nav-links" id="rx-nav-links">
            <li><a th:href="@{'/'}">Home</a></li>
            <li><a th:href="@{'/company'}">Company</a></li>
            <li><a th:href="@{'/features'}">Features</a></li>
            <li><a th:href="@{'/team'}">Team</a></li>
        </ul>

        <div class="rx-nav-actions">
            <a th:href="@{'/searchRide'}" class="rx-btn rx-btn-icon rx-btn-ghost" title="Search Rides">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>

            <!-- Profile avatar — links to profile or admin dashboard based on role -->
            <a th:if="${loggedInUser.roleList.get(0) == 'ROLE_USER'}" th:href="@{'/user/profile'}"
               class="hidden md:flex" title="Profile">
                <img th:src="@{${loggedInUser.profilePic}}"
                     class="rx-navbar-avatar"
                     alt="Profile picture"/>
            </a>
            <a th:if="${loggedInUser.roleList.get(0) == 'ROLE_ADMIN'}" th:href="@{'/admin/dashboard'}"
               class="hidden md:flex" title="Admin Dashboard">
                <img th:src="@{${loggedInUser.profilePic}}"
                     class="rx-navbar-avatar"
                     alt="Profile picture"/>
            </a>

            <!-- Logout button -->
            <a th:href="@{'/do-logout'}"
               class="rx-btn rx-btn-sm rx-btn-logout hidden md:inline-flex">
                Logout
            </a>

            <button id="rx-mobile-toggle" class="rx-mobile-toggle" type="button" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>
</header>
