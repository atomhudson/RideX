<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">

<head>
    <title>Publish a Ride — RideX</title>
</head>

<body>
<div id="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container">
            <div class="rx-section-header rx-reveal" style="margin-bottom: 40px;">
                <h2>Publish a <span class="rx-text-accent">Ride</span> in Just Minutes</h2>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">

                <!-- Form Card -->
                <div class="rx-form-card rx-reveal" style="max-width: none;">
                    <h1 style="font-size: 1.25rem;">Create a Ride</h1>
                    <p style="text-align: center; font-size: 0.84rem; color: var(--rx-text-muted); margin: -20px 0 28px;">
                        Publish your ride with just one click.
                    </p>
                    <div th:insert="~{fragments/message::messagebox}"></div>

                    <form id="publishRideForm" th:action="@{'/user/ride/process'}" th:object="${rideForm}" method="post">
                        <input type="hidden" th:field="*{rideId}" id="rideId"/>

                        <!-- From / To -->
                        <div class="rx-form-row">
                            <div>
                                <div class="rx-form-group rx-autocomplete-wrap">
                                    <label for="fromAddress">From (Address)</label>
                                    <input type="text" th:field="*{fromAddress}" id="fromAddress" name="fromAddress" class="rx-form-input" placeholder="Enter full address" autocomplete="off" required />
                                    <ul id="fromAddress-suggestions" class="rx-suggestion-list hidden"></ul>
                                </div>
                                <div class="rx-form-group rx-autocomplete-wrap" style="margin-top: 12px;">
                                    <label for="from">From (City)</label>
                                    <input type="text" id="from" th:field="*{fromCity}" name="from" class="rx-form-input" placeholder="Select city" autocomplete="off" required />
                                    <ul id="from-suggestions" class="rx-suggestion-list hidden"></ul>
                                </div>
                                <input type="hidden" th:field="*{fromLat}" id="fromLat" name="fromLat" />
                                <input type="hidden" th:field="*{fromLng}" id="fromLon" name="fromLon" />
                            </div>
                            <div>
                                <div class="rx-form-group rx-autocomplete-wrap">
                                    <label for="toAddress">To (Address)</label>
                                    <input type="text" th:field="*{toAddress}" id="toAddress" name="toAddress" class="rx-form-input" placeholder="Enter full address" autocomplete="off" required />
                                    <ul id="toAddress-suggestions" class="rx-suggestion-list hidden"></ul>
                                </div>
                                <div class="rx-form-group rx-autocomplete-wrap" style="margin-top: 12px;">
                                    <label for="to">To (City)</label>
                                    <input type="text" id="to" th:field="*{toCity}" name="to" class="rx-form-input" placeholder="Select city" autocomplete="off" required />
                                    <ul id="to-suggestions" class="rx-suggestion-list hidden"></ul>
                                </div>
                                <input type="hidden" th:field="*{toLat}" id="toLat" name="toLat" />
                                <input type="hidden" th:field="*{toLng}" id="toLon" name="toLon" />
                            </div>
                        </div>

                        <!-- Car -->
                        <div class="rx-form-group" style="margin-bottom: 20px;">
                            <label for="car">Select a Car</label>
                            <div th:if="${#lists.isEmpty(rideForm.available_car)}">
                                <p style="font-size: 0.84rem; color: #ef4444; margin-bottom: 8px;">
                                    No car found. Please <a th:href="@{'/user/car/register'}" class="rx-link">add your car</a> first.
                                </p>
                            </div>
                            <div th:unless="${#lists.isEmpty(rideForm.available_car)}">
                                <select id="car" name="car" class="rx-form-input" required>
                                    <option value="">-- Choose a car --</option>
                                    <option th:value="${rideForm.available_car.getLast()}" th:text="${rideForm.available_car.get(0)+' '+rideForm.available_car.get(1)}"></option>
                                </select>
                            </div>
                        </div>

                        <!-- Seats & Price -->
                        <div class="rx-form-row">
                            <div class="rx-form-group">
                                <label>Available Seats</label>
                                <div style="display: flex; align-items: center; gap: 16px; background: var(--rx-bg-tertiary); padding: 10px 16px; border-radius: var(--rx-radius-sm); border: 1px solid var(--rx-border);">
                                    <button type="button" onclick="adjustSeat(-1)" class="rx-btn rx-btn-ghost" style="padding: 4px 12px; font-size: 1rem;">-</button>
                                    <span id="seatValue" style="font-size: 1.1rem; font-weight: 700; color: var(--rx-text-primary);">1</span>
                                    <button type="button" onclick="adjustSeat(1)" class="rx-btn rx-btn-ghost" style="padding: 4px 12px; font-size: 1rem;">+</button>
                                </div>
                                <input type="hidden" id="seat" th:field="*{seat}" name="seat" value="1">
                            </div>
                            <div class="rx-form-group">
                                <label for="price">Price</label>
                                <input type="number" th:field="*{price}" id="price" name="price" min="0" placeholder="Price" class="rx-form-input" />
                            </div>
                        </div>

                        <!-- Departure Time -->
                        <div class="rx-form-group" style="margin-bottom: 24px;">
                            <label for="startTime">Departure Time</label>
                            <input type="datetime-local" th:field="*{departure_time}" id="startTime" name="startTime" class="rx-form-input" />
                        </div>

                        <!-- Preferences -->
                        <div style="margin-bottom: 24px;">
                            <h3 style="font-size: 0.9rem; font-weight: 600; color: var(--rx-text-primary); margin-bottom: 12px;">Preferences</h3>
                            <div class="rx-pref-grid">
                                <label for="petsAllowed" class="rx-pref-card">
                                    <input type="checkbox" th:field="*{petsAllowed}" id="petsAllowed" name="petsAllowed" style="display: none;" />
                                    <span class="rx-pref-emoji">🐾</span>
                                    <span class="rx-pref-label">Pets Allowed</span>
                                </label>
                                <label for="smokingAllowed" class="rx-pref-card">
                                    <input type="checkbox" th:field="*{smokingAllowed}" id="smokingAllowed" name="smokingAllowed" style="display: none;" />
                                    <span class="rx-pref-emoji">🚬</span>
                                    <span class="rx-pref-label">Smoking</span>
                                </label>
                                <label for="ac_available" class="rx-pref-card">
                                    <input type="checkbox" th:field="*{ac_available}" id="ac_available" name="ac_available" style="display: none;" />
                                    <span class="rx-pref-emoji">❄️</span>
                                    <span class="rx-pref-label">AC Available</span>
                                </label>
                                <label for="luggage_allowed" class="rx-pref-card">
                                    <input type="checkbox" th:field="*{luggage_allowed}" id="luggage_allowed" name="luggage_allowed" style="display: none;" />
                                    <span class="rx-pref-emoji">🧳</span>
                                    <span class="rx-pref-label">Luggage</span>
                                </label>
                            </div>
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="rx-btn rx-btn-primary" style="width: 100%; padding: 14px;">
                            Publish Ride <i class="fa-solid fa-arrow-right" style="margin-left: 6px; font-size: 0.8rem;"></i>
                        </button>
                    </form>
                </div>

                <!-- Steps Sidebar -->
                <div class="rx-reveal rx-reveal-delay-1" th:replace="~{/fragments/createRideStep :: steps}"></div>
            </div>
        </div>
    </section>
</div>
<script th:src="@{'/js/coordinates.js'}"></script>
<script th:src="@{'/js/createRide.js'}"></script>
<script th:src="@{'/js/createRideAutocomplete.js'}" type="module"></script>
</body>
</html>
