<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content},~{::title},~{::script})}">

<head>
    <title>Update Details — RideX</title>
</head>

<body>
<div id="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container">
            <div class="rx-form-card rx-form-card-wide rx-reveal">
                <h1>Update Your Details</h1>
                <div th:insert="~{fragments/message::messagebox}"></div>
                <form method="post" th:action="@{'/user/process-details'}" th:object="${userDetails}" enctype="multipart/form-data">

                    <!-- Name -->
                    <div class="rx-form-row">
                        <div class="rx-form-group">
                            <label for="fname">First Name</label>
                            <input id="fname" th:field="*{fname}" type="text" class="rx-form-input" />
                        </div>
                        <div class="rx-form-group">
                            <label for="lname">Last Name</label>
                            <input id="lname" th:field="*{lname}" type="text" class="rx-form-input" />
                        </div>
                    </div>

                    <!-- Bio -->
                    <div class="rx-form-group" style="margin-bottom: 20px;">
                        <label for="bio">Bio</label>
                        <textarea id="bio" th:field="*{bio}" placeholder="Write a short bio..." class="rx-form-input" style="min-height: 80px; resize: vertical;"></textarea>
                    </div>

                    <!-- DOB, Age, Gender -->
                    <div class="rx-form-row-3">
                        <div class="rx-form-group">
                            <label for="dateOfBirth">Date of Birth</label>
                            <input id="dateOfBirth" th:field="*{dateOfBirth}" type="date" class="rx-form-input" onchange="calculateAge()" />
                            <p th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}" style="color: #ef4444; font-size: 0.8rem; margin-top: 4px;">
                                Date of Birth is required
                            </p>
                        </div>
                        <div class="rx-form-group">
                            <label for="age">Age</label>
                            <input id="age" th:field="*{age}" type="number" class="rx-form-input" readonly />
                        </div>
                        <div class="rx-form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" th:field="*{gender}" class="rx-form-input">
                                <option value="">-- Select Gender --</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                            <p th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" style="color: #ef4444; font-size: 0.8rem; margin-top: 4px;">
                                Gender is required
                            </p>
                        </div>
                    </div>

                    <!-- Occupation & Languages -->
                    <div class="rx-form-row">
                        <div class="rx-form-group">
                            <label for="occupation">Occupation</label>
                            <input id="occupation" th:field="*{occupation}" type="text" placeholder="Engineer, Designer..." class="rx-form-input" />
                        </div>
                        <div class="rx-form-group">
                            <label for="spokenLanguages">Spoken Languages</label>
                            <input id="spokenLanguages" th:field="*{spokenLanguages}" type="text" placeholder="English, Hindi..." class="rx-form-input" />
                        </div>
                    </div>

                    <!-- Profile Image -->
                    <div class="rx-form-group" style="margin-bottom: 20px;">
                        <label for="image_file_input">Profile Image</label>
                        <input type="file" id="image_file_input" th:field="*{userImage}" class="rx-form-input" style="padding: 10px;" />
                        <p th:if="${#fields.hasErrors('userImage')}" th:errors="*{userImage}" style="color: #ef4444; font-size: 0.8rem; margin-top: 4px;">Invalid image</p>
                        <img id="upload_image_preview" src="" alt="Profile preview"
                             style="max-height: 200px; border-radius: var(--rx-radius-md); margin-top: 12px; display: none;" />
                    </div>

                    <!-- City -->
                    <div class="rx-form-group" style="margin-bottom: 24px;">
                        <label for="city">City</label>
                        <input id="city" th:field="*{city}" type="text" placeholder="New Delhi" class="rx-form-input" />
                        <p th:if="${#fields.hasErrors('city')}" th:errors="*{city}" style="color: #ef4444; font-size: 0.8rem; margin-top: 4px;">City is required</p>
                    </div>

                    <!-- Preferences -->
                    <div style="margin-bottom: 28px;">
                        <h3 style="font-size: 0.9rem; font-weight: 600; color: var(--rx-text-primary); margin-bottom: 12px;">Preferences</h3>
                        <div class="rx-pref-grid">
                            <label for="musicPreference" class="rx-pref-card">
                                <input type="checkbox" th:field="*{musicPreference}" id="musicPreference" style="display: none;" />
                                <span class="rx-pref-emoji">🎵</span>
                                <span class="rx-pref-label">Likes Music</span>
                            </label>
                            <label for="petsAllowed" class="rx-pref-card">
                                <input type="checkbox" th:field="*{petsAllowed}" id="petsAllowed" style="display: none;" />
                                <span class="rx-pref-emoji">🐾</span>
                                <span class="rx-pref-label">Pets Allowed</span>
                            </label>
                            <label for="smokingAllowed" class="rx-pref-card">
                                <input type="checkbox" th:field="*{smokingAllowed}" id="smokingAllowed" style="display: none;" />
                                <span class="rx-pref-emoji">🚬</span>
                                <span class="rx-pref-label">Smoking</span>
                            </label>
                            <label for="talkative" class="rx-pref-card">
                                <input type="checkbox" th:field="*{talkative}" id="talkative" style="display: none;" />
                                <span class="rx-pref-emoji">💬</span>
                                <span class="rx-pref-label">Talkative</span>
                            </label>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="rx-btn rx-btn-primary" style="width: 100%; padding: 14px;">
                        Save Details <i class="fa-solid fa-arrow-right" style="margin-left: 6px; font-size: 0.8rem;"></i>
                    </button>

                </form>
            </div>
        </div>
    </section>
</div>

</body>
<script>
    console.log("User Details Form");

    document.querySelector("#image_file_input").addEventListener("change", function (event) {
        let file = event.target.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = function () {
                const preview = document.querySelector("#upload_image_preview");
                preview.setAttribute("src", reader.result);
                preview.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    });

    function calculateAge() {
        const dob = document.getElementById("dateOfBirth").value;
        if (dob) {
            const birthDate = new Date(dob);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            const dayDiff = today.getDate() - birthDate.getDate();
            if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
                age--;
            }
            document.getElementById("age").value = age;
        }
    }
</script>
<script th:src="@{'/js/details.js'}" type="module"></script>
</html>
