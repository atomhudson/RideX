<aside data-th-fragment="sidebar" id="logo-sidebar"
       style="position: fixed; top: 0; left: 0; z-index: 50; width: 260px; height: 100vh; transform: translateX(-100%); transition: transform 0.3s; background: var(--rx-bg-card); border-right: 1px solid var(--rx-border);"
       aria-label="Sidebar">
    <div style="height: 100%; padding: 80px 16px 24px; overflow-y: auto;">
        <!-- Profile Section -->
        <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 28px;">
            <img onerror="this.onerror=null; this.src='https://flowbite.com/docs/images/logo.svg'"
                 data-th-src="@{${loggedInUser.profilePic}}" src="https://flowbite.com/docs/images/logo.svg"
                 style="width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid var(--rx-border);" alt="Profile" />
            <span style="font-size: 0.84rem; color: var(--rx-text-muted);" data-th-text="${loggedInUser.fName}+' '+${loggedInUser.lName}">User</span>
            <span style="font-size: 0.9rem; font-weight: 600; color: var(--rx-text-primary);">Welcome to RideX</span>
        </div>

        <!-- Navigation -->
        <nav style="display: flex; flex-direction: column; gap: 4px;">
            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_USER'}" th:href="@{'/user/dashboard'}"
               class="rx-sidebar-link"><i class="fa-solid fa-chart-pie" style="width: 20px;"></i> Dashboard</a>
            <a th:if="${loggedInUser.getRoleList().get(0) != 'ROLE_USER'}" th:href="@{'/admin/dashboard'}"
               class="rx-sidebar-link"><i class="fa-solid fa-chart-pie" style="width: 20px;"></i> Dashboard</a>

            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_USER'}" th:href="@{'/user/profile'}"
               class="rx-sidebar-link"><i class="fa-solid fa-user" style="width: 20px;"></i> Profile <span class="rx-badge" style="margin-left: auto;">Manage</span></a>
            <a th:if="${loggedInUser.getRoleList().get(0) != 'ROLE_USER'}" th:href="@{'/admin/profile'}"
               class="rx-sidebar-link"><i class="fa-solid fa-user" style="width: 20px;"></i> Profile <span class="rx-badge" style="margin-left: auto;">Manage</span></a>

            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_ADMIN'}" th:href="@{'/admin/createUser/add'}"
               class="rx-sidebar-link"><i class="fa-solid fa-user-plus" style="width: 20px;"></i> Add User</a>
            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_USER'}" th:href="@{'/user/contacts/add'}"
               class="rx-sidebar-link"><i class="fa-solid fa-plus" style="width: 20px;"></i> Add Contact</a>

            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_ADMIN'}" data-th-href="@{'/admin/getUsers'}"
               class="rx-sidebar-link"><i class="fa-regular fa-address-book" style="width: 20px;"></i> All Users</a>
            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_USER'}" data-th-href="@{'/user/contacts'}"
               class="rx-sidebar-link"><i class="fa-regular fa-address-book" style="width: 20px;"></i> Contacts</a>

            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_ADMIN'}" data-th-href="@{'/admin/sendEmail'}"
               class="rx-sidebar-link"><i class="fa-solid fa-envelope-circle-check" style="width: 20px;"></i> Send Email</a>
            <a th:if="${loggedInUser.getRoleList().get(0) == 'ROLE_USER'}" data-th-href="@{'/user/contactUs'}"
               class="rx-sidebar-link"><i class="fa-solid fa-comment-dots" style="width: 20px;"></i> Contact Us</a>

            <a href="#" class="rx-sidebar-link"><i class="fa-solid fa-pen-to-square" style="width: 20px;"></i> Feedback</a>

            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--rx-border);">
                <a th:href="@{'/do-logout'}" class="rx-sidebar-link" style="color: #ef4444;">
                    <i class="fa-solid fa-arrow-right-from-bracket" style="width: 20px; color: #ef4444;"></i> Logout
                </a>
            </div>
        </nav>
    </div>
</aside>
