<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content}, ~{::title}, ~{::#pageScript})}">
<head><title>Phone Verification — RideX</title></head>
<body>
<div id="content" style="background: var(--rx-bg-primary);"
     x-data="app()"
     th:attr="x-init=|initialize('__${phone}__', '__${step}__', '__${errorMessage}__')|"
     x-cloak>
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container" style="max-width: 520px;">
            <template x-if="step !== 'complete'">
                <div>
                    <div style="margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--rx-border);">
                        <div style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rx-text-muted); margin-bottom: 8px;" x-text="`Step ${step} of 2`"></div>
                        <div style="font-size: 1.2rem; font-weight: 700; color: var(--rx-text-primary);">
                            <span x-show="step === 1">Enter Your Phone Number</span>
                            <span x-show="step === 2">Enter OTP Sent to Your Phone</span>
                        </div>
                    </div>

                    <form th:action="@{/user/phoneVerify}" method="post" x-ref="form">
                        <input type="hidden" name="phone" :value="phone">

                        <div x-show="step === 1">
                            <div class="rx-form-group">
                                <input type="text" name="phone_display" x-model="phone" placeholder="Enter phone number" class="rx-form-input" required />
                            </div>
                        </div>

                        <div x-show="step === 2" style="display: flex; flex-direction: column; gap: 12px;">
                            <div class="rx-form-group">
                                <input type="text" name="otp" x-model="otp" placeholder="Enter OTP" class="rx-form-input" required />
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.8rem; color: var(--rx-text-muted);">Didn't receive the code?</span>
                                <button @click="resendOtp" class="rx-link" style="font-size: 0.8rem; background: none; border: none; cursor: pointer;" :disabled="resendDisabled">
                                    <span x-text="resendDisabled ? `Resend in ${resendTimer}s` : 'Resend OTP'"></span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </template>

            <template x-if="step === 'complete'">
                <div style="background: rgba(16,185,129,0.1); padding: 24px; border-radius: var(--rx-radius-md); text-align: center; color: var(--rx-accent); font-weight: 600;">
                    ✅ Phone number verified successfully!
                </div>
            </template>

            <template x-if="errorMessage">
                <div style="background: rgba(239,68,68,0.1); padding: 16px; border-radius: var(--rx-radius-sm); text-align: center; color: #ef4444; margin-top: 16px; font-size: 0.84rem;" x-text="errorMessage"></div>
            </template>
        </div>

        <div style="position: sticky; bottom: 0; left: 0; right: 0; padding: 20px 0; background: var(--rx-bg-primary);" x-show="step !== 'complete'">
            <div style="display: flex; justify-content: space-between; max-width: 520px; margin: 0 auto; padding: 0 16px;">
                <button x-show="step > 1" @click="step--" class="rx-btn rx-btn-outline" style="padding: 10px 24px;">Previous</button>
                <div>
                    <button x-show="step === 1" @click="nextStep()" class="rx-btn rx-btn-primary" style="padding: 10px 24px;">Send OTP</button>
                    <button x-show="step === 2" @click="verifyOtp()" class="rx-btn rx-btn-primary" style="padding: 10px 24px;">Verify</button>
                </div>
            </div>
        </div>
    </section>
</div>

<div id="pageScript">
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.js" defer></script>
    <style>[x-cloak] { display: none; }</style>
    <script>
        function app() {
            return {
                step: 1, phone: '', otp: '', errorMessage: '',
                resendDisabled: false, resendTimer: 30, resendInterval: null,
                initialize(serverPhone, serverStep, serverError) {
                    if (serverPhone && serverPhone !== 'null') this.phone = serverPhone;
                    if (serverStep === '2') this.step = 2;
                    if (serverError && serverError !== 'null') this.errorMessage = serverError;
                },
                nextStep() {
                    if (!this.phone || !this.phone.match(/^\d{10}$/)) { this.errorMessage = 'Please enter a valid 10-digit phone number.'; return; }
                    this.errorMessage = '';
                    fetch('/user/sendOtp', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ phone: this.phone }) })
                        .then(res => res.text()).then(data => { this.step = 2; this.startResendCooldown(); })
                        .catch(() => { this.errorMessage = 'Failed to send OTP. Try again.'; });
                },
                resendOtp() {
                    if (this.resendDisabled) return;
                    fetch('/user/sendOtp', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ phone: this.phone }) })
                        .then(res => res.text()).then(data => { this.startResendCooldown(); })
                        .catch(() => { this.errorMessage = 'Failed to resend OTP. Try again.'; });
                },
                startResendCooldown() {
                    this.resendDisabled = true; this.resendTimer = 30;
                    if (this.resendInterval) clearInterval(this.resendInterval);
                    this.resendInterval = setInterval(() => { this.resendTimer--; if (this.resendTimer <= 0) { this.resendDisabled = false; clearInterval(this.resendInterval); } }, 1000);
                },
                verifyOtp() {
                    if (!this.otp || this.otp.length < 4) { this.errorMessage = 'Please enter a valid OTP.'; return; }
                    this.errorMessage = '';
                    this.$refs.form.submit();
                }
            }
        }
    </script>
</div>
</body>
</html>
