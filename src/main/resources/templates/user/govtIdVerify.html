<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::#content}, ~{::title}, ~{::#pageScript})}">
<head><title>Verify Government ID — RideX</title></head>
<body>
<div id="content" style="background: var(--rx-bg-primary);" x-data="app()" x-cloak>
    <section class="rx-section" style="padding-top: 120px;">
        <div class="rx-container" style="max-width: 720px;">
            <template x-if="step !== 'complete'">
                <div>
                    <!-- Progress -->
                    <div style="margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--rx-border);">
                        <div style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rx-text-muted); margin-bottom: 8px;" x-text="`Step ${step} of 3`"></div>
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <div style="font-size: 1.2rem; font-weight: 700; color: var(--rx-text-primary);">
                                <span x-show="step === 1">Select ID Type</span>
                                <span x-show="step === 2">Enter Unique ID</span>
                                <span x-show="step === 3">Upload Your Photo</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 8px; width: 200px;">
                                <div style="flex: 1; background: var(--rx-border); border-radius: 4px; height: 6px;">
                                    <div style="border-radius: 4px; height: 6px; background: var(--rx-accent); transition: width 0.4s;" :style="'width: ' + (step / 3 * 100) + '%'"></div>
                                </div>
                                <div style="font-size: 0.75rem; color: var(--rx-text-muted);" x-text="parseInt(step / 3 * 100) + '%'"></div>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/user/govtId/submit}" method="post" enctype="multipart/form-data" x-ref="govtForm">
                        <input type="hidden" name="govtIdType" :value="idType">
                        <input type="hidden" name="govtIdNumber" :value="uniqueId">
                        <input type="hidden" name="imageData" :value="image">

                        <!-- Step 1 -->
                        <div x-show.transition.in="step === 1">
                            <div class="rx-form-group">
                                <label for="idType" style="color: var(--rx-text-primary); font-weight: 600;">Choose ID Type</label>
                                <select id="idType" x-model="idType" class="rx-form-input">
                                    <option value="">-- Select --</option>
                                    <option value="Aadhar">Aadhar Card</option>
                                    <option value="PAN">PAN Card</option>
                                    <option value="DrivingLicense">Driving License</option>
                                    <option value="Passport">Passport</option>
                                </select>
                            </div>
                        </div>

                        <!-- Step 2 -->
                        <div x-show.transition.in="step === 2">
                            <div class="rx-form-group">
                                <label for="uniqueId" style="color: var(--rx-text-primary); font-weight: 600;">Enter Unique ID</label>
                                <input id="uniqueId" x-model="uniqueId" type="text" placeholder="Enter unique identification number..." class="rx-form-input" />
                            </div>
                        </div>

                        <!-- Step 3 -->
                        <div x-show.transition.in="step === 3" style="text-align: center;">
                            <div style="width: 100%; max-width: 380px; height: 220px; margin: 0 auto 20px; border: 2px dashed var(--rx-border); border-radius: var(--rx-radius-md); display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--rx-bg-tertiary);">
                                <template x-if="image">
                                    <img :src="image" alt="Uploaded ID" style="object-fit: contain; width: 100%; height: 100%; border-radius: var(--rx-radius-sm);" />
                                </template>
                                <template x-if="!image">
                                    <span style="color: var(--rx-text-muted); font-size: 0.9rem;">No image selected</span>
                                </template>
                            </div>
                            <label for="fileInput" class="rx-btn rx-btn-outline" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">
                                <i class="fa-solid fa-camera"></i> Browse Photo
                            </label>
                            <input name="govtIdPhotoFile" id="fileInput" type="file" style="display: none;" accept="image/*"
                                @change="
                                    const file = $event.target.files[0];
                                    if (file) {
                                        if (file.size > 2 * 1024 * 1024) {
                                            alert('File size exceeds 2MB.');
                                            $event.target.value = null;
                                            image = '';
                                            return;
                                        }
                                        const reader = new FileReader();
                                        reader.onload = e => image = e.target.result;
                                        reader.readAsDataURL(file);
                                    }
                            ">
                            <p style="font-size: 0.8rem; color: var(--rx-text-muted); margin-top: 8px;">Upload the image of your selected ID type.</p>
                        </div>
                    </form>
                </div>
            </template>
        </div>

        <!-- Bottom Navigation -->
        <div style="position: sticky; bottom: 0; left: 0; right: 0; padding: 20px 0; background: var(--rx-bg-primary);" x-show="step !== 'complete'">
            <div style="display: flex; justify-content: space-between; max-width: 720px; margin: 0 auto; padding: 0 16px;">
                <button x-show="step > 1" @click="step--" class="rx-btn rx-btn-outline" style="padding: 10px 24px;">Previous</button>
                <div>
                    <button x-show="step < 3" @click="nextStep()" class="rx-btn rx-btn-primary" style="padding: 10px 24px;">Next</button>
                    <button x-show="step === 3" @click="complete()" class="rx-btn rx-btn-primary" style="padding: 10px 24px;">Complete</button>
                </div>
            </div>
        </div>
    </section>
</div>

<div id="pageScript">
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.js" defer></script>
    <style>[x-cloak] { display: none; }</style>
    <script>
        function app() {
            return {
                step: 1, idType: '', uniqueId: '', image: '',
                nextStep() {
                    if (this.step === 1 && !this.idType) { alert('Please select an ID type.'); return; }
                    if (this.step === 2 && !this.uniqueId.trim()) { alert('Please enter your unique ID.'); return; }
                    this.step++;
                },
                complete() {
                    if (!this.image) { alert('Please upload an image.'); return; }
                    this.$refs.govtForm.submit();
                }
            }
        }
    </script>
</div>
</body>
</html>
