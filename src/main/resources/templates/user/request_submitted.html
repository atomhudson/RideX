<!DOCTYPE html>
<html lang="en" th:replace="~{index :: parent(~{::content}, ~{::title}, ~{::script})}">
<title th:fragment="title">Request Submitted — RideX</title>
<div th:fragment="content" style="background: var(--rx-bg-primary);">
    <section class="rx-section" style="padding-top: 140px;">
        <div class="rx-container">
            <div class="rx-form-card rx-reveal" style="max-width: 560px; text-align: center;">
                <div style="margin-bottom: 20px;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; width: 72px; height: 72px; border-radius: 50%; background: rgba(16,185,129,0.1);">
                        <i class="fa-solid fa-circle-check" style="font-size: 2rem; color: var(--rx-accent);"></i>
                    </div>
                </div>
                <h1 style="font-size: 1.6rem;">Request Submitted</h1>
                <p style="font-size: 0.9rem; color: var(--rx-text-secondary); line-height: 1.6; margin-bottom: 8px;">
                    Thank you for submitting your details. We've successfully received your information and uploaded your Government ID.
                </p>
                <p style="font-size: 0.84rem; color: var(--rx-text-muted); line-height: 1.6;">
                    Our team will now review your ID. Once verified, you'll receive a confirmation email at
                    <span style="color: var(--rx-accent); font-weight: 600;" th:text="${userEmail}">demo@demo.test</span>.
                </p>
                <div style="margin-top: 24px;">
                    <button onclick="window.location.href='/user/profile'" class="rx-btn rx-btn-primary" style="padding: 12px 32px;">
                        ⬅ Back to Home
                    </button>
                </div>
            </div>
        </div>
    </section>
</div>
<script th:fragment="script">console.log("Request Submitted page loaded");</script>
</html>
